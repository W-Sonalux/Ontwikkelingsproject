<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=1920"/>
  <title>SOZZIAL – Speler 1</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/homepage/style.css"/>
</head>
<body data-player="player1">

  <header>
    <div class="logo-wrap">
      <img src="/media/LOGO.png" class="logo-img" alt="SOZZIAL"/>
    </div>
    <div class="mode-switch">
      <button class="mode-btn active" data-mode="p1">Speler 1 kiest</button>
      <button class="mode-btn"        data-mode="click">Eerst klikt</button>
      <button class="mode-btn"        data-mode="vote">Stemmen</button>
    </div>
  </header>

  <main>
    <div class="status-bar" id="status-bar">Kies een spel</div>

    <div class="games-grid">
      <div class="game-card" data-game="memory">
        <div class="game-icon"><img src="/media/memory.png" alt="Memory"/></div>
        <h2>Memory</h2>
        <p>Vind alle paren</p>
      </div>
      <div class="game-card" data-game="stokvangen">
        <div class="game-icon"><img src="/media/stokvangen.png" alt="Stokvangen"/></div>
        <h2>Stokvangen</h2>
        <p>Vang de vallende stok</p>
      </div>
      <div class="game-card" data-game="four-in-a-row">
        <div class="game-icon"><img src="/media/4-op-een-rij.png" alt="4 op een rij"/></div>
        <h2>4 op een rij</h2>
        <p>Verbind vier schijven</p>
      </div>
      <div class="game-card" data-game="puzzel">
        <div class="game-icon"><img src="/media/puzzel.png" alt="Puzzel"/></div>
        <h2>Puzzel</h2>
        <p>Leg de puzzel compleet</p>
      </div>
      <div class="game-card" data-game="kleurenflits">
        <div class="game-icon"><img src="/media/kleurenflits.png" alt="Kleurenflits"/></div>
        <h2>Kleurenflits</h2>
        <p>Onthoud de volgorde</p>
      </div>
    </div>
  </main>

<audio id="bg-muziek" src="/sounds/Background_01.mp3" loop preload="auto"></audio>


  <script src="/socket.io/socket.io.js"></script>
  <script src="/homepage/favicon-bg.js"></script>
  <script src="/homepage/game.js"></script>
</body>
</html>
